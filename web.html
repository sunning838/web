<h1>웹개발기초</h1>
<p>html : HTML은 웹페이지의 가장 기본적인 틀을 만드는 언어입니다. 
    텍스트, 이미지, 버튼 등 무엇이 어디에 들어갈지 배치하는 역할을 합니다. </p>
<p>css : HTML로 세운 뼈대에 색을 입히고 예쁘게 꾸미는 역할을 합니다. 
    글자 크기, 배경색, 레이아웃 배치 등을 담당하여 사용자에게 보기 좋게 만듭니다.</p>
<p>javascript : 
    정적인 웹페이지에 생동감을 불어넣는 언어입니다. 
    사용자가 버튼을 클릭했을 때 메뉴가 튀어나오거나, 정보를 실시간으로 업데이트하는 등 상호작용을 가능하게 합니다.
</p>
