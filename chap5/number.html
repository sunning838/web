<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>레드향 주문하기</title>
  </head>
  <body>
    <h1>레드향 주문하기</h1>
    <form>
      <fieldset>
        <legend class="p1">주문자 정보</legend>
        <label for="user-id">주문자 ID: </label>
        <input type="text" id="user-id" />
      </fieldset>

      <fieldset>
        <legend>상품 선택</legend>
        <!-- Do it! 스핀 박스를 사용해 숫자 입력하기 -->

        <p id="p2"><b>주문할 상품을 선택해 주세요.</b></p>
        <ul>
          <li>
            <input type="checkbox" id="present3" />
            <label for="present3">선물용 3kg</label>
            <input type="number" min="0" max="5" />
            <label for="present3">개(최대 5개)</label>
          </li>

          <li>
            <input type="checkbox" id="present5" />
            <label for="present5">선물용 5kg</label>
            <input type="number" min="0" max="5" />
            <label for="present5">개(최대 5개)</label>
          </li>

          <li>
            <input type="checkbox" id="household3" />
            <label for="household3">가정용 3kg</label>
            <input type="number" min="0" max="5" />
            <label for="household3">개(최대 5개)</label>
          </li>

          <li>
            <input type="checkbox" id="household5" />
            <label for="household5">가정용 5kg</label>
            <input type="number" min="0" max="5" />
            <label for="household5">개(최대 5개)</label>
          </li>
        </ul>
        <p><b>포장 선택</b></p>
        <ul>
          <li>
            <input type="radio" id="use" name="packaging" />
            <label for="use">선물 포장</label><br />
          </li>

          <li>
            <input type="radio" id="unuse" name="packaging" />
            <label for="unuse">선물 포장 안함</label><br />
          </li>
        </ul>
      </fieldset>

      <fieldset>
        <legend>배송 정보</legend>
        <ul>
          <li>
            <label for="user-name">이름 </label>
            <input type="text" id="user-name" />
          </li>
          <li>
            <label for="addr">배송 주소</label>
            <input type="text" id="addr" />
          </li>
          <li>
            <label for="mail">메일 주소</label>
            <input type="email" id="mail" />
          </li>
          <li>
            <label for="phone">연락처</label>
            <input type="tel" id="phone" />
          </li>
        </ul>
      </fieldset>
      <div id="buttons">
        <input type="submit" value="주문하기" />
        <input type="reset" value="취소하기" />
      </div>
    </form>
  </body>
</html>
