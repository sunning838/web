<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2단 레이아웃</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      #wrapper {
        width: 1200px;
        margin: auto;
      }
      #header {
        width: 1200px;
        height: 120px;
        background-color: gray;
      }
      #sidebar {
        width: 300px;
        height: 600px;
        background-color: azure;
        float: left;
      }
      #contents {
        width: 900px;
        height: 600px;
        background-color: rgb(130, 248, 248);
        float: left;
      }
      #footer {
        clear: both;
        width: 1200px;
        height: 100px;
        background-color: rgb(3, 3, 3);
        color: white;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <div id="header">헤더</div>
      <div id="sidebar">사이드바</div>
      <div id="contents">컨텐츠</div>
      <div id="footer">푸터</div>
    </div>
  </body>
</html>
