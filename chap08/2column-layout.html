<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2단 레이아웃</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      div {
        border: 2px solid black;
      }
      #header {
        width: 1200px;
        height: 120px;
      }
      #sidebar {
        width: 300px;
        height: 600px;
        float: left;
      }
      #contents {
        width: 900px;
        height: 600px;
        float: left;
      }
      #footer {
        width: 1200px;
        height: 100px;
        clear: both;
      }
    </style>
  </head>
  <body>
    <header>
      <div id="header">헤더</div>
    </header>
    <div id="sidebar">사이드바</div>
    <div id="contents">본문</div>
    <div id="footer">푸터</div>
  </body>
</html>
