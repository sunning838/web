<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float 활용</title>
    <style>
        * {
        box-sizing: border-box;
        }
    </style>
</head>
<body>

<h2>Images Side by Side</h2>
<p>Float images side by side:</p>

<div>
  <div class="img-container">
  <img src="./images/img_5terre.jpg" alt="Italy" style="width:100%">
  </div>
  <div class="img-container">
  <img src="./images/img_forest.jpg" alt="Forest" style="width:100%">
  </div>
  <div class="img-container">
  <img src="./images/img_mountains.jpg" alt="Mountains" style="width:100%">
  </div>
</div>

<p>Note that we also use the clearfix hack to take care of the layout flow, and that we add the box-sizing property to make sure that the image container doesn't break due to extra padding. Try to remove this code to see the effect.</p>
    
</body>
</html>
